short_bio: >-
  <p>
    Lead Data Scientist at <strong>Presight (G42)</strong>, Abu Dhabi — an ADX-listed AI and decision intelligence company. Leading agentic systems, multi-agent orchestration, and LLM-based tool development across Legal, Energy, and enterprise domains.<br><br>
    My work sits at the intersection of <strong>research and production</strong>: LLM fine-tuning, RAG, knowledge graphs, hallucination control, and decision-boundary problems in low-resource agentic settings. I care about research that survives contact with real systems.<br><br>
    Previously at <strong>UNEY</strong> (Dubai), <strong>Microsoft Copilot</strong> (Principal Applied Scientist), <strong>Mobius Labs</strong> (Berlin), and <strong>The University of Edinburgh</strong> (Research Associate).<br><br>
    PhD in Distributed Machine Learning from <strong>IIT Guwahati</strong>. 20+ publications · 84+ citations on top paper · Google Scholar <a href="https://scholar.google.com/citations?user=S8QouS0AAAAJ" target="_blank">profile</a>.
  </p>

